# TrackMaster — nginx config for the production React build.
# Proxies /api/*, /health, and /{short_code} redirect paths to the backend.

upstream trackmaster_backend {
    # "backend" is the service name in docker-compose.yml
    server backend:8001;
}

server {
    listen 80;
    server_name _;

    # Allow large file uploads (xlsx / proxies / ua lists can be big)
    client_max_body_size 100M;

    # ─── Proxy API calls to FastAPI ─────────────────────────────
    location /api/ {
        proxy_pass         http://trackmaster_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Backend health endpoint ────────────────────────────────
    location = /health {
        proxy_pass http://trackmaster_backend;
        proxy_set_header Host $host;
    }

    # ─── WebSocket for live click updates ───────────────────────
    location /ws/ {
        proxy_pass         http://trackmaster_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_read_timeout 3600s;
    }

    # ─── Short-link redirect (non-/api aliases) ─────────────────
    # Server exposes redirects at BOTH /api/r/{code} and /r/{code}, /t/{code}.
    # The /api prefix is already proxied; the short aliases below are handy
    # for users who share http://localhost:3000/r/abc123 links.
    location ~ ^/(r|t)/ {
        proxy_pass       http://trackmaster_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── React SPA — everything else ────────────────────────────
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }
}

# ─────────────────────────────────────────────────────────────
#  RealFlow — docker-compose for self-hosted backend
#
#  Production (recommended):
#    Frontend → Vercel (https://realflow.online)
#    Backend + MongoDB → this compose stack on your home PC,
#    exposed to the internet via Cloudflare Tunnel (api.realflow.online).
#
#  Services:
#    • mongo      → MongoDB 7, data persisted in a named volume
#    • backend    → FastAPI + Playwright (exposed on 127.0.0.1:8001)
#    • frontend   → [optional, profile=local-frontend] only for local testing
#
#  Quick start (backend-only, the usual case):
#    1. copy deployment\home-pc\.env.template .env  and edit values
#    2. docker compose up -d --build
#    3. curl http://localhost:8001/health  →  {"status":"ok"}
#
#  Also run local frontend (for testing without Vercel):
#    docker compose --profile local-frontend up -d
#    Open http://localhost:3000
#
#  Admin login: ADMIN_EMAIL / ADMIN_PASSWORD from .env
#  Full deployment guide: deployment/DEPLOYMENT.md
# ─────────────────────────────────────────────────────────────

services:

  # ─── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: realflow-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Uncomment if you want to reach Mongo directly from the host:
    # ports:
    #   - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [realflow-net]

  # ─── Backend (FastAPI + Playwright) ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realflow-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "${DB_NAME:-realflow}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      POSTBACK_TOKEN: "${POSTBACK_TOKEN:-change-me-postback-token}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@realflow.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      # Optional — leave empty to disable email / use alternate providers
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      SENDER_EMAIL: "${SENDER_EMAIL:-onboarding@resend.dev}"
    volumes:
      # Persist real-user-traffic and form-filler result zips / screenshots
      - rut_results:/app/real_user_traffic_results
      - ff_results:/app/form_filler_results
    # Exposed on host :8001 so Cloudflare Tunnel (or reverse proxy) can reach it.
    # For pure local-only use, comment this out — compose networking still works.
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks: [realflow-net]

  # ─── Frontend (React build + nginx) ───────────────────────
  # Only needed for LOCAL testing — in production the frontend is
  # served by Vercel (https://realflow.online). Run it with:
  #   docker compose --profile local-frontend up -d
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty → frontend hits same origin (nginx proxies /api → backend).
        # This is the easiest setup and works for any host.
        REACT_APP_BACKEND_URL: ""
    container_name: realflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    profiles:
      - local-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks: [realflow-net]

# ─── Volumes ────────────────────────────────────────────────
volumes:
  mongo_data:
  rut_results:
  ff_results:

# ─── Networks ───────────────────────────────────────────────
networks:
  realflow-net:
    driver: bridge
